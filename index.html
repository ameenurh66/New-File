<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Checker</title>
    <link rel="stylesheet" href="Studentresult.css">
</head>
<body>
    <h1>Student Result Checker</h1>

    <input type="text" placeholder="Enter Student Name" id="sname"> 
    <input type="number" placeholder="Math Score" id="math">
    <input type="number" placeholder="English Score" id="english">
    <input type="number" placeholder="Chemistry Score" id="chemistry">

    <button id="check-btn">Check Result</button>

    <div id="result"></div>

    <script src="Studentresult.js"></script>
</body>
</html>
